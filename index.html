<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carousel</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #fff; overflow: hidden; }

  .stack {
    width: 100vw;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  .row-head  { flex: 0 0 22.2222%; }
  .row-torso { flex: 0 0 24.4444%; }
  .row-legs  { flex: 1; }

  .row { position: relative; width: 100%; overflow: hidden; margin-bottom: -1px; }
  .track { display: flex; height: 100%; transition: transform 0.55s cubic-bezier(0.77,0,0.175,1); }
  .slide { flex: 0 0 100%; height: 100%; }
  .slide img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    object-position: center center;
  }

  .row-head  .slide img { object-position: center top; }
  .row-torso .slide img { object-position: center center; }
  .row-legs  .slide img { object-position: center bottom; }

  .btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    z-index: 10; width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.2); background: rgba(255,255,255,0.6);
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; backdrop-filter: blur(6px); transition: background 0.2s;
  }
  .btn:hover { background: rgba(255,255,255,0.9); }
  .btn svg { width: 16px; height: 16px; stroke: #000; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .btn-prev { left: 14px; }
  .btn-next { right: 14px; }
</style>
</head>
<body>
<div class="stack">

  <div class="row row-head" id="row-0">
    <div class="track" id="track-0">
      <div class="slide"><img src="h1.png" alt=""></div>
      <div class="slide"><img src="h2.png" alt=""></div>
      <div class="slide"><img src="h3.png" alt=""></div>
    </div>
    <button class="btn btn-prev" onclick="slide(0,-1)"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <button class="btn btn-next" onclick="slide(0,1)"><svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg></button>
  </div>

  <div class="row row-torso" id="row-1">
    <div class="track" id="track-1">
      <div class="slide"><img src="t1.png" alt=""></div>
      <div class="slide"><img src="t2.png" alt=""></div>
      <div class="slide"><img src="t3.png" alt=""></div>
    </div>
    <button class="btn btn-prev" onclick="slide(1,-1)"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <button class="btn btn-next" onclick="slide(1,1)"><svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg></button>
  </div>

  <div class="row row-legs" id="row-2">
    <div class="track" id="track-2">
      <div class="slide"><img src="l1.png" alt=""></div>
      <div class="slide"><img src="l2.png" alt=""></div>
      <div class="slide"><img src="l3.png" alt=""></div>
    </div>
    <button class="btn btn-prev" onclick="slide(2,-1)"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <button class="btn btn-next" onclick="slide(2,1)"><svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg></button>
  </div>

</div>
<script>
  const state = [0,0,0];
  function slide(row, dir) {
    state[row] = (state[row] + dir + 3) % 3;
    document.getElementById('track-' + row).style.transform = 'translateX(-' + (state[row] * 100) + '%)';
  }
  [0,1,2].forEach(row => {
    const el = document.getElementById('row-' + row);
    let startX = null;
    el.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, {passive:true});
    el.addEventListener('touchend', e => {
      if (startX === null) return;
      const dx = e.changedTouches[0].clientX - startX;
      if (Math.abs(dx) > 40) slide(row, dx < 0 ? 1 : -1);
      startX = null;
    });
  });
</script>
</body>
</html>
