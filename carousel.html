<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Look Builder</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; background: #000; overflow-x: hidden; }

  .stack { width: 100vw; display: flex; flex-direction: column; }

  .row {
    position: relative;
    width: 100%;
    /* each row is 1/3 of a 16:9 frame = 100vw * 9/16 / 3 */
    height: calc(100vw * 9 / 16 / 3);
    overflow: hidden;
    background: #000;
  }

  .track {
    display: flex;
    height: 100%;
    will-change: transform;
    transition: transform 0.55s cubic-bezier(0.77, 0, 0.175, 1);
  }

  .slide {
    flex: 0 0 100%;
    height: 100%;
  }

  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* head images: content sits at top of frame */
  .row-head .slide img { object-position: center top; }
  /* torso images: content sits in upper-middle */
  .row-torso .slide img { object-position: center 30%; }
  /* legs images: content sits at bottom */
  .row-legs .slide img { object-position: center bottom; }

  .btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(0,0,0,0.35);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(6px);
    transition: background 0.2s, border-color 0.2s;
    font-size: 0;
  }
  .btn:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.5); }
  .btn svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .btn-prev { left: 14px; }
  .btn-next { right: 14px; }

  .dots {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 5px;
    z-index: 10;
  }
  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    transition: background 0.25s, transform 0.25s;
    cursor: pointer;
  }
  .dot.active { background: #fff; transform: scale(1.3); }
</style>
</head>
